# raylib performance-capture configuration - Vulkan backend (rlvk) REGRESSION SUBSET
#
# A 6-scene subset of performance_rlvk.ini for fast regression checking during backend
# development (~3 min of capture vs ~10 for the full curated set). Scenes are chosen so each
# guards a distinct cost center; compare the result against the committed same-backend capture
# with regression_compare.sh. The full set (performance_rlvk.ini via run_all.sh) remains the
# source of the committed cross-backend reports.
#
#   bench_idle                     per-frame fixed overhead (submit/flip/present path)
#   bench_drawcalls                8000 draws/frame: pipeline bind + push-descriptor cost
#   bench_instanced                instanced draw path
#   performance_stress_test        high-volume 2D batching (real API mix)
#   shaders_raymarching_rendering  fragment-bound full-screen work (resolve/present cost)
#   models_first_person_maze       representative mixed 3D scene
#
# (read via rini - "key<space>value", '#' comments)

backend         rlvk
examples_dir    ../../raylib/examples
capture_output  rlvk_regression

# Same measurement parameters as the full config so numbers stay comparable
duration_ms     10000
warmup_ms       500
runs            3
timeout_ms      30000

examples        others/bench_idle, others/bench_drawcalls, others/bench_instanced, others/performance_stress_test, shaders/shaders_raymarching_rendering, models/models_first_person_maze
