# raylib performance-capture configuration - OpenGL 3.3 backend (rlgl)
#
# One config per backend; they differ only in 'backend' and 'capture_output'. The example list
# is a curated, heavy, input-independent subset that renders meaningful work every frame so a
# full-speed 10 s window is representative. (read via rini - "key<space>value", '#' comments)

backend         rlgl
examples_dir    ../../raylib/examples
capture_output  rlgl

# Per example: run 'runs' times, each 'duration_ms' at full speed after 'warmup_ms' warm-up.
duration_ms     10000
warmup_ms       500
runs            3
timeout_ms      30000

# Curated example set (category/name, comma-separated on one line)
examples        shapes/shapes_basic_shapes, textures/textures_tiled_drawing, textures/textures_particles_blending, shapes/shapes_starfield_effect, models/models_loading, models/models_heightmap_rendering, models/models_skybox_rendering, models/models_waving_cubes, models/models_first_person_maze, core/core_3d_camera_free, shaders/shaders_basic_lighting, shaders/shaders_basic_pbr, shaders/shaders_mandelbrot_set, shaders/shaders_raymarching_rendering, others/performance_stress_test, others/performance_stress_test_direct, others/bench_idle, others/bench_drawcalls, others/bench_instanced
