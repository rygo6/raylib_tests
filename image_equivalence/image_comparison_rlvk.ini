# raylib image-comparison configuration — VULKAN BACKEND (rlvk) vs the GL reference.
#
# Each image_comparison_<backend>.ini represents ONE candidate backend compared against a
# reference baseline, producing its own report_<backend>.html. Additional cross-backend
# comparisons (e.g. rlvk vs rlsw_baseline) can be added as further ini files in this repo.
# (read via rini - key<space>value, "#" comments)

# Deterministic capture settings (raylib is a sibling repo: ../../raylib)
examples_dir  ../../raylib/examples
frames        0,10,30
timeout_ms    8000

# Comparison settings
ref_dir       rlgl_baseline
cmp_dir       rlvk
diff_dir      diffs_rlvk
report        report_rlvk.html
tolerance     2
spatial_tolerance 1   # absorb 1px line/curve rasterization tie-break shifts between drivers

# Examples excluded from comparison: inherently non-deterministic, no fixed timestep can help.
# One 'exclude' line per example (a comma-separated list on a single line also works).
exclude       shapes_digital_clock     # renders the real system wall-clock (libc time())
exclude       shapes_clock_of_clocks   # renders the real system wall-clock (libc time())
exclude       audio_raw_stream         # visualizes the live audio buffer (real-time audio thread)
exclude       audio_stream_callback    # visualizes the live audio buffer (real-time audio thread)
exclude       core_window_flags        # displays live window focus state (OS/WM decides, not the frame clock)
exclude       raylib_opengl_interop    # renders via raw OpenGL calls (GL interop demo) - not meaningful for a Vulkan backend
exclude       shaders_rlgl_compute     # compute shaders not implemented in rlvk (rlComputeShaderDispatch stub); its FS reads an SSBO the layout cannot yet bind

# Expected-variability allowances: 'allow <example> <maxDiffPixelsPerFrame>'.
# These examples have knife-edge outcomes that legitimately differ between graphics backends
# on the SAME data: cross-compiler float ULP flips fractal escape-iteration counts at set
# boundaries, 1-ULP clip-coordinate differences shift snapped silhouette edges one 1/256
# subpixel step, and lighting math (pow/normalize) lands one step above the channel tolerance
# on scattered pixels. Frames within budget report as PASS~ and are listed in the HTML report.
# Budgets are sized from measured worst frames (2026-07-04, run 30) with ~3x headroom; real
# regressions have always measured >= 1000s of pixels. Frame size is 360000 px (800x450).

# -- fractal boundary ULP (escape-time iteration count flips at 1-ULP differences) --
allow shaders_mandelbrot_set     2000   # measured 663/frame
allow shaders_julia_set           500   # measured 158/frame

# -- silhouette / texel-boundary ties (1-ULP clip coords shift snapped edges a subpixel) --
allow core_highdpi_demo           150   # measured 51/frame (centered text on atlas texel boundaries)
allow models_basic_voxel          100   # measured 14/frame
allow models_loading              100   # measured 10/frame
allow models_cubicmap_rendering    50   # measured 3/frame
allow models_yaw_pitch_roll        50   # measured 2/frame
allow textures_polygon_drawing     50   # measured 3/frame
allow core_monitor_detector        50   # measured 1/frame (one text glyph tie)
allow models_billboard_rendering   50   # measured 1/frame

# -- shading ULP just above channel tolerance (pow/normalize noise on lit surfaces) --
allow shaders_simple_mask         100   # measured 8/frame
allow shaders_custom_uniform       50   # measured 2/frame
allow core_vr_simulator            50   # measured 2/frame (lens-distortion math ULP)

# -- MSAA edge coverage (ACCEPTED POLICY 2026-07-07): rlvk uses standard Vulkan MSAA (the
# implementation's sample pattern + fixed-function AVERAGE resolve) instead of replicating
# GL's pattern and sRGB-correct resolve, so every FLAG_MSAA_4X scene differs from the GL
# baseline along antialiased edges. Budgets sized from measured worst frames (2026-07-07)
# with ~3x headroom; an MSAA-scene regression shows as tens of thousands of pixels or a
# fully different image, well above these budgets. --
allow audio_module_playing      16000   # measured 5346/frame
allow models_decals              6000   # measured 1856/frame
allow shaders_basic_lighting    20000   # measured 6418/frame
allow shaders_basic_pbr          8000   # measured 2489/frame
allow shaders_cel_shading       20000   # measured 6448/frame
allow shaders_fog_rendering      6000   # measured 1831/frame
allow shaders_lightmap_rendering 2000   # measured 634/frame
allow shaders_model_shader      27000   # measured 8846/frame
allow shaders_normalmap_rendering 8000  # measured 2699/frame
allow shaders_shadowmap_rendering 9000  # measured 3029/frame
allow shapes_bouncing_ball        300   # measured 92/frame
allow shapes_lines_bezier        4000   # measured 1348/frame
allow shapes_math_sine_cosine   14000   # measured 4534/frame
allow shapes_rlgl_color_wheel    2500   # measured 788/frame
allow shapes_rlgl_triangle       1300   # measured 423/frame
allow shapes_splines_drawing     6000   # measured 2046/frame
allow text_3d_drawing           31000   # measured 10384/frame
allow textures_textured_curve    8500   # measured 2769/frame
