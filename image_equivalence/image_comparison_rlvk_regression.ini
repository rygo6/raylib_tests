# raylib image-comparison configuration — VULKAN BACKEND (rlvk) REGRESSION SUBSET.
#
# A curated ~37-scene subset of the full rlvk suite (image_comparison_rlvk.ini) for fast
# regression checking during backend development: every rlvk code path is exercised at least
# once, so a change that breaks a path fails here in ~2 minutes instead of a ~15 minute full
# run. The full suite remains the merge gate; this is the inner-loop check.
#
# The 'include' list drives BOTH tools: image_comparison_capture runs only these examples
# (skipping everything else even if built) and image_comparison_diff compares only these
# (a listed example missing from the candidate is still a FAIL).
#
# Settings (tolerance, spatial_tolerance, allowances) MUST mirror image_comparison_rlvk.ini
# for the scenes listed here — when the full config changes, update this file to match.
# (read via rini - key<space>value, "#" comments)

examples_dir  ../../raylib/examples
frames        0,10,30
timeout_ms    8000

# Comparison settings (regression outputs are kept separate from full-suite artifacts)
ref_dir       rlgl_baseline
cmp_dir       rlvk_regression
diff_dir      diffs_rlvk_regression
report        report_rlvk_regression.html
tolerance     2
spatial_tolerance 1   # absorb 1px line/curve rasterization tie-break shifts between drivers

# Regression subset — one scene per backend code path (comments say which path it guards)
include core_scissor_test              # dynamic scissor state + dedup gating
include core_render_texture            # framebuffer bookkeeping, lazy rendering-scope open
include core_3d_camera_split_screen    # multiple render-texture scopes in one frame
include core_vr_simulator              # stereo per-eye batch flush loop
include shapes_basic_shapes            # core shape batching
include shapes_lines_drawing           # 1px Bresenham line rasterization
include shapes_splines_drawing         # MSAA + thick line strips (sample locations path)
include shapes_rlgl_triangle           # raw rlgl immediate-mode calls under MSAA
include shapes_starfield_effect        # heavy batch pressure + alpha blending
include textures_framebuffer_rendering # FBO render path
include textures_to_image              # texture readback (rlReadTexturePixels)
include textures_blend_modes           # full blend-factor translation table
include textures_srcrec_dstrec         # sampling, flipped source rects
include textures_raw_data              # uncompressed pixel-format uploads
include textures_bunnymark             # texture-heavy batching volume
include text_font_sdf                  # grayscale format + custom SDF shader
include text_3d_drawing                # 3D text: alpha + depth interaction (allowance scene)
include models_loading                 # static mesh upload (DEVICE_LOCAL staged path)
include models_animation_gpu_skinning  # skinning shader, bone-matrix uniforms
include models_animation_blending      # CPU animation, rlUpdateVertexBuffer staged copies
include models_heightmap_rendering     # generated heightmap mesh + texture
include models_skybox_rendering        # cubemap textures
include models_mesh_generation         # all generated meshes, missing-attribute divisor-0 broadcast
include models_point_rendering         # point-list topology
include models_geometric_shapes        # 3D wires/lines topologies
include models_rlgl_solar_system       # matrix stack + rlgl immediate mode
include shaders_basic_lighting         # lit shading under MSAA (allowance scene)
include shaders_basic_pbr              # PBR, many uniforms/textures (allowance scene)
include shaders_mandelbrot_set         # fractal escape-time ULP: the tolerated-diff path (allowance scene)
include shaders_custom_uniform         # runtime uniform updates via default-block UBO (allowance scene)
include shaders_mesh_instancing        # instanced vertex attributes (per-instance divisor)
include shaders_multi_sample2d         # multiple sampler2D units -> multi-binding push descriptors
include shaders_deferred_rendering     # multiple render targets (MRT framebuffer)
include shaders_shadowmap_rendering    # depth-only pass + depth-texture sampling
include shaders_postprocessing         # render texture + post-process shader chain
include shaders_depth_rendering        # depth-texture attachment visualization
include shaders_hybrid_rendering       # mixed raster/raymarch depth write + read

# Expected-variability allowances — copied verbatim from image_comparison_rlvk.ini for the
# scenes in this subset (see that file for the measurement rationale). Keep in sync.
allow shaders_mandelbrot_set     2000   # measured 663/frame
allow models_loading              100   # measured 10/frame
allow text_3d_drawing              50   # measured 3/frame
allow shaders_basic_lighting      100   # measured 10/frame
allow shaders_basic_pbr            50   # measured 3/frame
allow shaders_custom_uniform       50   # measured 2/frame
allow shaders_shadowmap_rendering  50   # measured 1/frame
allow core_vr_simulator            50   # measured 2/frame (lens-distortion math ULP)
