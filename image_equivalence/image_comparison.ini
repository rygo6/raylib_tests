# raylib image-comparison configuration (read via rini - key<space>value, '#' comments)

# Deterministic capture settings (raylib is a sibling repo: ../../raylib)
examples_dir  ../../raylib/examples
frames        0,10,30
timeout_ms    8000

# Comparison settings
ref_dir       baseline
cmp_dir       rlvk
diff_dir      diffs
report        report.html
tolerance     2
spatial_tolerance 1   # absorb 1px line/curve rasterization tie-break shifts between drivers

# Examples excluded from comparison: inherently non-deterministic, no fixed timestep can help.
# One 'exclude' line per example (a comma-separated list on a single line also works).
exclude       shapes_digital_clock     # renders the real system wall-clock (libc time())
exclude       shapes_clock_of_clocks   # renders the real system wall-clock (libc time())
exclude       audio_raw_stream         # visualizes the live audio buffer (real-time audio thread)
exclude       audio_stream_callback    # visualizes the live audio buffer (real-time audio thread)
exclude       core_window_flags        # displays live window focus state (OS/WM decides, not the frame clock)
exclude       raylib_opengl_interop    # renders via raw OpenGL calls (GL interop demo) - not meaningful for a Vulkan backend
