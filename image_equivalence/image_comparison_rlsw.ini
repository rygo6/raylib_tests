# raylib image-comparison configuration — SOFTWARE RENDERER (rlsw) self-baseline suite.
#
# rlsw (src/external/rlsw.h, GRAPHICS=GRAPHICS_API_OPENGL_SOFTWARE) is a CPU rasterizer:
# fully deterministic, no driver/GPU variance. It is NOT compared against the GL baseline
# (its rasterization rules legitimately differ everywhere, and the GL-1.1 path has no
# shader support) — it is compared against ITS OWN captured baseline, BIT-EXACT:
# tolerance 0, no spatial slack, no allowances. Any pixel change is a real change.
#
# Workflow (from this directory):
#   1. Build the rlsw lib + examples (deterministic flag) and capture the baseline once:
#        ../src/image_comparison_capture rlsw_baseline
#   2. After changes, capture a candidate set and diff:
#        ../src/image_comparison_capture rlsw_candidate
#        ../src/image_comparison_diff image_comparison_rlsw.ini

examples_dir  ../../raylib/examples
frames        0,10,30
timeout_ms    8000

ref_dir       rlsw_baseline
cmp_dir       rlsw_candidate
diff_dir      diffs_rlsw
report        report_rlsw.html
tolerance     0
spatial_tolerance 0

# Same inherently non-deterministic set as the GPU suites
exclude       shapes_digital_clock     # renders the real system wall-clock (libc time())
exclude       shapes_clock_of_clocks   # renders the real system wall-clock (libc time())
exclude       audio_raw_stream         # visualizes the live audio buffer (real-time audio thread)
exclude       audio_stream_callback    # visualizes the live audio buffer (real-time audio thread)
exclude       core_window_flags        # displays live window focus state (OS/WM decides, not the frame clock)
exclude       raylib_opengl_interop    # renders via raw OpenGL calls (GL interop demo)
